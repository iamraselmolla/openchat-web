version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_dev_password
      POSTGRES_DB: ai_chat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp -d ai_chat_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ai-chat-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    ports:
      - "4000:4000"

volumes:
  postgres_data:
  redis_data:
